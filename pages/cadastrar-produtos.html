<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalesMock - Cadastrar Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html"><i class="bi bi-cart-check-fill"></i> SalesMock</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="lista-produtos.html">Produtos</a></li>
                    <li class="nav-item"><a class="nav-link" href="lista-clientes.html">Clientes</a></li>
                    <li class="nav-item"><a class="nav-link" href="lista-pedidos.html">Pedidos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5 pt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0 text-primary fw-bold"><i class="bi bi-plus-circle me-2"></i>Novo Produto</h5>
                    </div>
                    <div class="card-body p-4">
                        <form id="form-produto" class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label">Nome do Produto</label>
                                <input type="text" id="nome" class="form-control" placeholder="Ex: Teclado Mecânico" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Código/SKU</label>
                                <input type="text" id="codigo" class="form-control" placeholder="1001" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Categoria</label>
                                <select id="categoria" class="form-select" required>
                                    <option value="">Selecione...</option>
                                    <option value="Eletrônicos">Eletrônicos</option>
                                    <option value="Informática">Informática</option>
                                    <option value="Periféricos">Periféricos</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Preço (R$)</label>
                                <input type="number" step="0.01" id="preco" class="form-control" placeholder="0.00" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Estoque Inicial</label>
                                <input type="number" id="estoque" class="form-control" placeholder="0" required>
                            </div>
                            <div class="col-12 mt-4 text-end">
                                <a href="lista-produtos.html" class="btn btn-outline-secondary me-2">Cancelar</a>
                                <button type="submit" class="btn btn-primary px-4">Salvar Produto</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/produtos.js"></script>
</body>
</html>
