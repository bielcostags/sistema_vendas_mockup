<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h2 class="mb-4">
                        Cadastro de Bicicleta
                    </h2>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Modelo
                            </label>

                            <input
                                id="modelo"
                                class="form-control"
                                placeholder="Ex: Caloi Elite">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Marca
                            </label>

                            <input
                                id="marca"
                                class="form-control"
                                placeholder="Ex: Caloi">

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Categoria
                            </label>

                            <select
                                id="categoria"
                                class="form-select">

                                <option>Mountain Bike</option>
                                <option>Speed</option>
                                <option>Urbana</option>
                                <option>BMX</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Quantidade em Estoque
                            </label>

                            <input
                                id="estoque"
                                type="number"
                                min="0"
                                value="0"
                                class="form-control"
                                oninput="calcularTotal()">

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Preço Unitário (R$)
                            </label>

                            <input
                                id="preco"
                                type="number"
                                min="0"
                                step="0.01"
                                value="0"
                                class="form-control"
                                oninput="calcularTotal()">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Valor Total em Estoque (R$)
                            </label>

                            <input
                                id="valorTotal"
                                class="form-control bg-light"
                                readonly>

                        </div>

                    </div>

                    <button
                        onclick="salvar()"
                        class="btn btn-success w-100">

                        Cadastrar Bicicleta

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js">
    
function calcularTotal() {

    const estoque =
        Number(document.getElementById('estoque').value) || 0;

    const preco =
        Number(document.getElementById('preco').value) || 0;

    const total = estoque * preco;

    document.getElementById('valorTotal').value =
        total.toLocaleString('pt-BR', {
            style: 'currency',
            currency: 'BRL'
        });
}

function salvar() {

    const produto = {

        modelo: document.getElementById('modelo').value,
        marca: document.getElementById('marca').value,
        categoria: document.getElementById('categoria').value,
        estoque: document.getElementById('estoque').value,
        preco: document.getElementById('preco').value,
        valorTotal: document.getElementById('valorTotal').value

    };

    const produtos =
        JSON.parse(localStorage.getItem('produtos')) || [];

    produtos.push(produto);

    localStorage.setItem(
        'produtos',
        JSON.stringify(produtos)
    );

    alert('Bicicleta cadastrada com sucesso!');

    window.location.href = 'lista-produtos.html';
}

calcularTotal();</script>
