<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 & Icons -->

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">
     <header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

        <div class="container">

            <a href="index.html" class="navbar-brand">
                BikeStore
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse justify-content-end"
                 id="navbarNav">

                <ul class="navbar-nav">

                    <!-- CADASTROS -->

                    <li class="nav-item dropdown me-2">

                        <a class="btn btn-success dropdown-toggle"
                           href="#"
                           role="button"
                           data-bs-toggle="dropdown">

                            Cadastros

                        </a>

                        <ul class="dropdown-menu">

                            <li>
                                <a class="dropdown-item"
                                   href="cadastrar-clientes.html">

                                    Cadastrar Cliente

                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item"
                                   href="cadastrar-produtos.html">

                                    Cadastrar Produto

                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item"
                                   href="cadastrar-pedidos.html">

                                    Cadastrar Pedido

                                </a>
                            </li>

                        </ul>

                    </li>

                    <!-- LISTAGENS -->

                    <li class="nav-item dropdown">

                        <a class="btn btn-primary dropdown-toggle"
                           href="#"
                           role="button"
                           data-bs-toggle="dropdown">

                            Listagens

                        </a>

                        <ul class="dropdown-menu">

                            <li>
                                <a class="dropdown-item"
                                   href="lista-clientes.html">

                                    Lista de Clientes

                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item"
                                   href="lista-produtos.html">

                                    Lista de Produtos

                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item"
                                   href="lista-pedidos.html">

                                    Lista de Pedidos

                                </a>
                            </li>

                        </ul>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

</header>
<div class="container mt-5">

    <h2 class="pb-3 border-bottom">
        Pedidos Realizados
    </h2>

    <div class="row fw-bold border-bottom py-2">

        <div class="col-md-3">Cliente</div>
        <div class="col-md-3">Produto</div>
        <div class="col-md-3">Quantidade</div>
        <div class="col-md-3">Pagamento</div>

    </div>

    <div id="listaPedidos"></div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js">
    const pedidos =
JSON.parse(localStorage.getItem("pedidos")) || [];

pedidos.forEach(pedido => {

    document.getElementById("listaPedidos").innerHTML += `

        <div class="row py-3 border-bottom">

            <div class="col-md-3">
                ${pedido.cliente}
            </div>

            <div class="col-md-3">
                ${pedido.produto}
            </div>

            <div class="col-md-3">
                ${pedido.quantidade}
            </div>

            <div class="col-md-3">
                ${pedido.pagamento}
            </div>

        </div>

    `;

});

</script>

</body>
</html>
