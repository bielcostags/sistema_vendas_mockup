<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalesMock - Novo Pedido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">
    <header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

        <div class="container">

            <a href="index.html" class="navbar-brand">
                BikeStore
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse justify-content-end"
                 id="navbarNav">

                <ul class="navbar-nav">

                    <!-- CADASTROS -->

                    <li class="nav-item dropdown me-2">

                        <a class="btn btn-success dropdown-toggle"
                           href="#"
                           role="button"
                           data-bs-toggle="dropdown">

                            Cadastros

                        </a>

                        <ul class="dropdown-menu">

                            <li>
                                <a class="dropdown-item"
                                   href="cadastrar-clientes.html">

                                    Cadastrar Cliente

                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item"
                                   href="cadastrar-produtos.html">

                                    Cadastrar Produto

                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item"
                                   href="cadastrar-pedidos.html">

                                    Cadastrar Pedido

                                </a>
                            </li>

                        </ul>

                    </li>

                    <!-- LISTAGENS -->

                    <li class="nav-item dropdown">

                        <a class="btn btn-primary dropdown-toggle"
                           href="#"
                           role="button"
                           data-bs-toggle="dropdown">

                            Listagens

                        </a>

                        <ul class="dropdown-menu">

                            <li>
                                <a class="dropdown-item"
                                   href="lista-clientes.html">

                                    Lista de Clientes

                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item"
                                   href="lista-produtos.html">

                                    Lista de Produtos

                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item"
                                   href="lista-pedidos.html">

                                    Lista de Pedidos

                                </a>
                            </li>

                        </ul>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

</header>

    <div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h2 class="mb-4">
                        Novo Pedido
                    </h2>

                    <div class="mb-3">

                        <label class="form-label">
                            Cliente
                        </label>

                        <select
                            id="cliente"
                            class="form-select">
                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Bicicleta
                        </label>

                        <select
                            id="produto"
                            class="form-select">
                        </select>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Quantidade
                            </label>

                            <input
                                id="quantidade"
                                type="number"
                                min="1"
                                value="1"
                                class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Pagamento
                            </label>

                            <select
                                id="pagamento"
                                class="form-select">

                                <option>PIX</option>
                                <option>Cartão</option>
                                <option>Boleto</option>
                                <option>Dinheiro</option>

                            </select>

                        </div>

                    </div>

                    <hr>

                    <button
                        onclick="salvar()"
                        class="btn btn-success w-100">

                        Finalizar Pedido

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>
</nav>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
