<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalesMock - Novo Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html"><i class="bi bi-cart-check-fill"></i> SalesMock</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="lista-produtos.html">Produtos</a></li>
                    <li class="nav-item"><a class="nav-link active" href="lista-clientes.html">Clientes</a></li>
                    <li class="nav-item"><a class="nav-link" href="lista-pedidos.html">Pedidos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5 pt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0 text-success fw-bold"><i class="bi bi-person-plus me-2"></i>Cadastrar Cliente</h5>
                    </div>
                    <div class="card-body p-4">
                        <form id="form-cliente" class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label">Nome Completo</label>
                                <input type="text" id="nome-cliente" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">CPF</label>
                                <input type="text" id="cpf-cliente" class="form-control" placeholder="000.000.000-00" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Telefone</label>
                                <input type="text" id="fone-cliente" class="form-control" placeholder="(00) 00000-0000" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">E-mail</label>
                                <input type="email" id="email-cliente" class="form-control" placeholder="cliente@email.com" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Endereço</label>
                                <textarea id="end-cliente" class="form-control" rows="2"></textarea>
                            </div>
                            <div class="col-12 mt-4 text-end">
                                <button type="submit" class="btn btn-success px-4">Salvar Cliente</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/clientes.js"></script>
</body>
</html>
