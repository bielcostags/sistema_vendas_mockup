<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalesMock - Listagem de Clientes</title>
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">

    <!-- Navbar Fixa -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html"><i class="bi bi-cart-check-fill"></i> SalesMock</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="lista-produtos.html">Produtos</a></li>
                    <li class="nav-item"><a class="nav-link active" href="lista-clientes.html">Clientes</a></li>
                    <li class="nav-item"><a class="nav-link" href="lista-pedidos.html">Pedidos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5 pt-5">
        <!-- Cabeçalho da Página -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold mb-0 text-dark">Clientes</h3>
                <p class="text-muted small">Gerencie sua base de contatos</p>
            </div>
            <a href="cadastro-clientes.html" class="btn btn-success shadow-sm">
                <i class="bi bi-person-plus-fill me-2"></i>Novo Cliente
            </a>
        </div>

        <!-- Filtro e Tabela -->
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <!-- Campo de busca interno -->
                <div class="p-3 border-bottom bg-white">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" id="busca-cliente" class="form-control border-start-0 bg-light" placeholder="Filtrar por nome, CPF ou e-mail...">
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Nome Completo</th>
                                <th>CPF</th>
                                <th>Telefone</th>
                                <th>E-mail</th>
                                <th class="text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-clientes">
                            <!-- Os dados serão injetados aqui pelo js/clientes.js -->
                        </tbody>
                    </table>
                </div>
                
                <!-- Feedback se a tabela estiver vazia -->
                <div id="msg-vazio" class="text-center py-5 d-none">
                    <i class="bi bi-people fs-1 text-muted opacity-25"></i>
                    <p class="text-muted mt-2">Nenhum cliente encontrado.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer de Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/clientes.js"></script>

    <!-- Script de Busca Local (Opcional, para refinar a UI) -->
    <script>
        const inputBusca = document.getElementById('busca-cliente');
        inputBusca.addEventListener('keyup', function() {
            const termo = this.value.toLowerCase();
            const linhas = document.querySelectorAll('#tabela-clientes tr');
            
            linhas.forEach(linha => {
                const texto = linha.innerText.toLowerCase();
                linha.style.display = texto.includes(termo) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
